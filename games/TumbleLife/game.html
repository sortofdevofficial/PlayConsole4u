<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Tumble Life</title>
  <style>
    :root{
      --bg1:#b9d8ea;--bg2:#8fb9cc;--bg3:#6f9bb0;
      --glass:rgba(243,250,255,.18);--line:rgba(255,255,255,.22);--text:#f7fbff;
      --muted:rgba(247,251,255,.72);--shadow:0 18px 50px rgba(16,38,52,.18);
      --green:#6f8f63;--green2:#5e7f55;--dark:#203645;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;
      background:linear-gradient(180deg,var(--bg1),var(--bg2) 48%,var(--bg3));color:var(--text);}
    canvas{display:block;width:100vw;height:100vh}

    #main-menu{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;
      align-items:center;justify-content:center;background:linear-gradient(180deg,rgba(185,216,234,.96),rgba(111,155,176,.97));backdrop-filter:blur(10px);}
    #main-menu h1{font-size:clamp(28px,5vw,52px);font-weight:900;letter-spacing:-.04em;color:#f8fdff;
      text-shadow:0 6px 24px rgba(32,54,69,.24);margin-bottom:8px;}
    .menu-card{width:min(320px,calc(100vw - 40px));padding:16px 14px;border-radius:20px;
      background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(16px);}
    #menu-home,#mp-screen{width:100%;display:flex;flex-direction:column;align-items:center;gap:10px;}
    #mp-screen{display:none}
    .menu-btn{width:100%;padding:12px 16px;border-radius:14px;border:1px solid var(--line);
      font-size:14px;font-weight:700;cursor:pointer;color:#f8fdff;
      background:linear-gradient(180deg,rgba(111,143,99,.90),rgba(94,127,85,.92));
      box-shadow:0 10px 22px rgba(33,56,45,.16);transition:transform .15s,box-shadow .15s;}
    .menu-btn:hover{transform:translateY(-1px);box-shadow:0 14px 28px rgba(33,56,45,.20);}
    #mp-screen h2{color:#f8fdff;font-size:16px;font-weight:800;margin-bottom:4px;}
    #mp-screen label{color:rgba(247,251,255,.45);font-size:10px;text-transform:uppercase;letter-spacing:.09em;align-self:flex-start;margin-top:4px;}
    .code-box{width:100%;background:rgba(255,255,255,.12);border-radius:12px;padding:10px 12px;
      display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid rgba(255,255,255,.16);}
    #my-code{font-family:monospace;font-size:26px;font-weight:900;color:#f6fff8;letter-spacing:.22em;}
    .sm-btn{background:rgba(255,255,255,.10);color:#f8fdff;border:1px solid rgba(255,255,255,.14);
      border-radius:10px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;}
    .sm-btn:hover{background:rgba(255,255,255,.16);}
    #room-input{width:100%;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);
      border-radius:12px;padding:10px 12px;color:#fff;font-size:26px;font-family:monospace;
      font-weight:900;letter-spacing:.22em;outline:none;text-align:center;text-transform:uppercase;}
    #room-input::placeholder{color:rgba(255,255,255,.3);font-weight:400;letter-spacing:.05em;font-size:14px;}
    #btn-join{width:100%;padding:12px;background:linear-gradient(180deg,rgba(111,143,99,.95),rgba(94,127,85,.95));
      color:#fff;border:1px solid rgba(255,255,255,.12);border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;}
    #btn-back{background:none;border:none;color:rgba(255,255,255,.7);cursor:pointer;font-size:12px;margin-top:4px;}
    #btn-back:hover{color:#fff;}
    .mp-hint{color:rgba(255,255,255,.56);font-size:10px;text-align:center;line-height:1.6;}
    #mp-error{color:#ff6b6b;font-size:13px;font-weight:700;text-align:center;display:none;margin-top:4px;}
    #mp-loading{color:#8fb7ca;font-size:14px;font-weight:700;text-align:center;display:none;margin-top:4px;}
    #host-wait{color:#6f8f63;font-size:13px;font-weight:700;text-align:center;display:none;margin-top:8px;}

    #speedometer{position:fixed;bottom:14px;right:14px;background:rgba(32,54,69,.34);backdrop-filter:blur(10px);
      color:#f8fdff;padding:6px 12px;border-radius:12px;font-size:12px;font-weight:800;letter-spacing:.08em;
      pointer-events:none;z-index:100;border:1px solid rgba(255,255,255,.12);display:none;box-shadow:0 10px 24px rgba(18,31,42,.18);}
    #hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);color:rgba(248,253,255,.66);
      font-size:10px;pointer-events:none;text-shadow:0 1px 3px rgba(0,0,0,.25);letter-spacing:.05em;z-index:100;white-space:nowrap;}

    #mobile-ui{display:none;position:fixed;inset:0;pointer-events:none;z-index:150;}
    #joy-zone{position:absolute;left:16px;bottom:20px;width:96px;height:96px;background:rgba(255,255,255,.10);
      border:1px solid rgba(255,255,255,.18);border-radius:50%;pointer-events:all;backdrop-filter:blur(8px);}
    #joy-knob{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:40px;height:40px;
      background:rgba(255,255,255,.28);border:1px solid rgba(255,255,255,.28);border-radius:50%;pointer-events:none;}
    #cam-zone{position:absolute;right:0;top:0;width:55%;height:70%;pointer-events:all;}
    #mobile-btns{position:absolute;right:16px;bottom:20px;display:flex;flex-direction:column;gap:8px;align-items:flex-end;pointer-events:all;}
    .m-btn{background:rgba(32,54,69,.32);backdrop-filter:blur(8px);color:#fff;border:1px solid rgba(255,255,255,.16);
      border-radius:50%;width:48px;height:48px;font-size:9px;font-weight:800;cursor:pointer;
      display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.15;user-select:none;box-shadow:0 10px 22px rgba(18,31,42,.18);}
    .m-btn:active{transform:scale(.96);}
    @media (max-width:900px){#hint{display:none}.menu-card{padding:16px 12px}#speedometer{right:10px;bottom:10px}}
  </style>
</head>
<body>
<div id="main-menu">
  <h1>Tumble Life</h1>
  <div class="menu-card">
    <div id="menu-home">
      <button class="menu-btn" id="btn-sp">▶ Singleplayer</button>
      <button class="menu-btn" id="btn-mp-open">🌐 Multiplayer</button>
    </div>
    <div id="mp-screen">
      <h2>Multiplayer</h2>
      <label>Your Code (share this)</label>
      <div class="code-box">
        <span id="my-code">····</span>
        <button class="sm-btn" id="btn-copy">Copy</button>
      </div>
      <div id="host-wait">Waiting for friend...</div>
      <label style="margin-top:12px">Join Friend</label>
      <input id="room-input" type="text" placeholder="Enter 4-letter code" maxlength="4"
             autocomplete="off" spellcheck="false" inputmode="text"/>
      <button id="btn-join">Join</button>
      <p class="mp-hint">Host shares 4-letter code → Friend types it → Join</p>
      <div id="mp-error"></div>
      <div id="mp-loading">Connecting...</div>
      <button id="btn-back">← Back</button>
    </div>
  </div>
</div>

<div id="speedometer">00 KM/H</div>
<div id="hint">WASD move · F enter car · Drag camera</div>

<div id="mobile-ui">
  <div id="joy-zone"><div id="joy-knob"></div></div>
  <div id="cam-zone"></div>
  <div id="mobile-btns">
    <button class="m-btn" id="btn-enter">F<br><span style="font-size:7px">CAR</span></button>
    <button class="m-btn" id="btn-sprint">⚡</button>
  </div>
</div>

<script>document.addEventListener('contextmenu', e => e.preventDefault());</script>
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
<script type="module">
  import { startGame } from './game.js';

  const CHARS = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  function makeCode() {
    let c = '';
    for (let i = 0; i < 4; i++) c += CHARS[Math.floor(Math.random() * CHARS.length)];
    return c;
  }

  const IS_MOBILE = innerWidth <= 900 || navigator.maxTouchPoints > 0;
  const menu      = document.getElementById('main-menu');
  const menuHome  = document.getElementById('menu-home');
  const mpScreen  = document.getElementById('mp-screen');
  const mpError   = document.getElementById('mp-error');
  const mpLoading = document.getElementById('mp-loading');
  const hostWait  = document.getElementById('host-wait');
  const codeEl    = document.getElementById('my-code');
  const roomInput = document.getElementById('room-input');

  let peer      = null;
  let myId      = null;
  let hostConn  = null;
  let joining   = false;

  // Force uppercase as user types
  roomInput.addEventListener('input', () => {
    const pos = roomInput.selectionStart;
    roomInput.value = roomInput.value.toUpperCase().replace(/[^A-Z]/g, '');
    roomInput.setSelectionRange(pos, pos);
  });

  function showError(msg) {
    mpLoading.style.display = 'none';
    hostWait.style.display  = 'none';
    mpError.textContent     = msg;
    mpError.style.display   = 'block';
    joining = false;
    const btn = document.getElementById('btn-join');
    btn.textContent = 'Join';
    btn.disabled    = false;
  }

  function hideError() {
    mpError.textContent    = '';
    mpError.style.display  = 'none';
    mpLoading.style.display = 'none';
    hostWait.style.display  = 'none';
  }

  function showLoading(msg = 'Connecting...') {
    mpError.style.display   = 'none';
    hostWait.style.display  = 'none';
    mpLoading.textContent   = msg;
    mpLoading.style.display = 'block';
  }

  // Try to register a 4-letter code with PeerJS; retry on collision
  function initPeer(attempt = 0) {
    if (peer && myId) return; // already ready

    const code = makeCode();
    codeEl.textContent = '····';

    peer = new Peer(code, { debug: 0 });

    peer.on('open', id => {
      myId = id;
      codeEl.textContent = id;
      hideError();
      hostWait.style.display = 'block';
    });

    peer.on('error', e => {
      if (e.type === 'unavailable-id') {
        // Code taken — destroy and retry with a new one
        peer.destroy();
        peer  = null;
        myId  = null;
        if (attempt < 10) {
          initPeer(attempt + 1);
        } else {
          showError('Could not get a room code. Try again.');
        }
        return;
      }
      console.warn('Peer error:', e.type, e);
    });

    peer.on('connection', conn => {
      // Host: incoming connection from guest
      conn.on('open', () => {
        menu.style.display = 'none';
        if (IS_MOBILE) document.getElementById('mobile-ui').style.display = 'block';
        startGame({ peer, connection: conn, isMobile: IS_MOBILE, isMultiplayer: true, isHost: true });
      });
    });
  }

  // ── Buttons ─────────────────────────────────────────────────
  document.getElementById('btn-sp').addEventListener('click', () => {
    menu.style.display = 'none';
    if (IS_MOBILE) document.getElementById('mobile-ui').style.display = 'block';
    startGame({ peer: null, isMobile: IS_MOBILE, isMultiplayer: false });
  });

  document.getElementById('btn-mp-open').addEventListener('click', () => {
    menuHome.style.display = 'none';
    mpScreen.style.display = 'flex';
    hideError();
    initPeer();
  });

  document.getElementById('btn-back').addEventListener('click', () => {
    if (hostConn) { hostConn.close(); hostConn = null; }
    if (peer)     { peer.destroy();   peer = null; myId = null; }
    joining = false;
    mpScreen.style.display = 'none';
    menuHome.style.display = 'flex';
    hideError();
  });

  document.getElementById('btn-copy').addEventListener('click', () => {
    if (myId) navigator.clipboard?.writeText(myId);
  });

  document.getElementById('btn-join').addEventListener('click', () => {
    const code = roomInput.value.trim().toUpperCase();

    if (code.length !== 4 || !/^[A-Z]{4}$/.test(code)) {
      showError('Enter the 4-letter code from the host');
      return;
    }

    if (!peer || !myId) {
      showError('Still connecting — wait a moment');
      return;
    }

    if (joining) return;
    joining = true;
    hideError();
    showLoading('Connecting...');

    const btn = document.getElementById('btn-join');
    btn.textContent = 'Joining...';
    btn.disabled    = true;

    hostConn = peer.connect(code, { reliable: true, serialization: 'json' });

    let opened = false;

    hostConn.on('open', () => {
      opened = true;
      menu.style.display = 'none';
      if (IS_MOBILE) document.getElementById('mobile-ui').style.display = 'block';
      startGame({ peer, connection: hostConn, isMobile: IS_MOBILE, isMultiplayer: true, isHost: false });
    });

    hostConn.on('error', () => {
      if (opened) return;
      hostConn.close();
      hostConn = null;
      joining  = false;
      btn.textContent = 'Join';
      btn.disabled    = false;
      showError('Code not found or host offline');
    });

    hostConn.on('close', () => {
      if (!opened) {
        hostConn = null;
        joining  = false;
        btn.textContent = 'Join';
        btn.disabled    = false;
        showError('Host disconnected');
      }
    });

    // Timeout if no response in 8 s
    setTimeout(() => {
      if (!opened) {
        hostConn?.close();
        hostConn = null;
        joining  = false;
        btn.textContent = 'Join';
        btn.disabled    = false;
        showError('Timed out — check the code and try again');
      }
    }, 8000);
  });
</script>
</body>
</html>
