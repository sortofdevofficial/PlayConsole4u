<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no"/>
  <title>Tumble Life</title>
  <style>
    :root{--glass:rgba(243,250,255,.18);--line:rgba(255,255,255,.22);--shadow:0 18px 50px rgba(16,38,52,.18);}
    *{box-sizing:border-box;margin:0;padding:0}
    html,body{width:100%;height:100%;overflow:hidden;font-family:'Segoe UI',sans-serif;
      background:linear-gradient(180deg,#b9d8ea,#8fb9cc 48%,#6f9bb0);color:#f7fbff;}
    canvas{display:block;width:100vw;height:100vh}

    /* ── Menu ── */
    #main-menu{position:fixed;inset:0;z-index:500;display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      background:linear-gradient(180deg,rgba(185,216,234,.96),rgba(111,155,176,.97));backdrop-filter:blur(10px);}
    #main-menu h1{font-size:clamp(28px,5vw,52px);font-weight:900;letter-spacing:-.04em;color:#f8fdff;
      text-shadow:0 6px 24px rgba(32,54,69,.24);margin-bottom:20px;}
    .menu-card{width:min(320px,calc(100vw - 40px));padding:18px 16px;border-radius:20px;
      background:var(--glass);border:1px solid var(--line);box-shadow:var(--shadow);backdrop-filter:blur(16px);}
    #menu-home,#mp-screen{width:100%;display:flex;flex-direction:column;align-items:center;gap:10px;}
    #mp-screen{display:none}
    .menu-btn{width:100%;padding:13px 16px;border-radius:14px;border:1px solid var(--line);
      font-size:14px;font-weight:700;cursor:pointer;color:#f8fdff;
      background:linear-gradient(180deg,rgba(111,143,99,.90),rgba(94,127,85,.92));
      box-shadow:0 10px 22px rgba(33,56,45,.16);transition:transform .15s;}
    .menu-btn:hover{transform:translateY(-2px);}
    #mp-screen h2{color:#f8fdff;font-size:16px;font-weight:800;}
    #mp-screen label{color:rgba(247,251,255,.55);font-size:10px;text-transform:uppercase;letter-spacing:.09em;align-self:flex-start;margin-top:6px;}
    .code-box{width:100%;background:rgba(255,255,255,.12);border-radius:12px;padding:10px 14px;
      display:flex;align-items:center;justify-content:space-between;gap:8px;border:1px solid rgba(255,255,255,.16);}
    #my-code{font-family:monospace;font-size:26px;font-weight:900;color:#7df9c0;letter-spacing:.22em;}
    .sm-btn{background:rgba(255,255,255,.10);color:#f8fdff;border:1px solid rgba(255,255,255,.14);
      border-radius:10px;padding:6px 10px;font-size:11px;font-weight:700;cursor:pointer;}
    .sm-btn:hover{background:rgba(255,255,255,.2);}
    #room-input{width:100%;background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.16);
      border-radius:12px;padding:10px 14px;color:#fff;font-size:24px;font-family:monospace;
      font-weight:900;letter-spacing:.22em;outline:none;text-align:center;text-transform:uppercase;}
    #room-input::placeholder{color:rgba(255,255,255,.3);font-weight:400;letter-spacing:.05em;font-size:14px;}
    #btn-join{width:100%;padding:13px;background:linear-gradient(180deg,rgba(111,143,99,.95),rgba(94,127,85,.95));
      color:#fff;border:1px solid rgba(255,255,255,.12);border-radius:12px;font-size:14px;font-weight:800;cursor:pointer;}
    #btn-join:disabled{opacity:.5;cursor:default;}
    #btn-back{background:none;border:none;color:rgba(255,255,255,.6);cursor:pointer;font-size:12px;margin-top:2px;}
    #btn-back:hover{color:#fff;}
    .mp-hint{color:rgba(255,255,255,.5);font-size:10px;text-align:center;line-height:1.6;}
    #mp-status{font-size:12px;font-weight:700;text-align:center;min-height:18px;color:#8fb7ca;}
    #mp-error{color:#ff8a8a;font-size:12px;font-weight:700;text-align:center;display:none;}

    /* ── HUD ── */
    #speedometer{position:fixed;bottom:14px;right:14px;background:rgba(32,54,69,.4);backdrop-filter:blur(10px);
      color:#f8fdff;padding:6px 12px;border-radius:12px;font-size:12px;font-weight:800;letter-spacing:.08em;
      pointer-events:none;z-index:100;border:1px solid rgba(255,255,255,.12);display:none;}
    #hint{position:fixed;bottom:12px;left:50%;transform:translateX(-50%);color:rgba(248,253,255,.6);
      font-size:10px;pointer-events:none;letter-spacing:.05em;z-index:100;white-space:nowrap;}

    /* ── Mobile ── */
    #mobile-ui{display:none;position:fixed;inset:0;pointer-events:none;z-index:150;}
    #joy-zone{position:absolute;left:16px;bottom:20px;width:96px;height:96px;
      background:rgba(255,255,255,.10);border:1px solid rgba(255,255,255,.18);
      border-radius:50%;pointer-events:all;backdrop-filter:blur(8px);}
    #joy-knob{position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:40px;height:40px;
      background:rgba(255,255,255,.3);border:1px solid rgba(255,255,255,.3);border-radius:50%;pointer-events:none;}
    #cam-zone{position:absolute;right:0;top:0;width:55%;height:70%;pointer-events:all;}
    #mobile-btns{position:absolute;right:16px;bottom:20px;display:flex;flex-direction:column;gap:8px;align-items:flex-end;pointer-events:all;}
    .m-btn{background:rgba(32,54,69,.35);backdrop-filter:blur(8px);color:#fff;
      border:1px solid rgba(255,255,255,.18);border-radius:50%;width:52px;height:52px;
      font-size:9px;font-weight:800;cursor:pointer;display:flex;align-items:center;
      justify-content:center;text-align:center;line-height:1.2;user-select:none;}
    .m-btn:active{transform:scale(.94);background:rgba(255,255,255,.2);}
    @media(max-width:900px){#hint{display:none}}
  </style>
</head>
<body>

<div id="main-menu">
  <h1>Tumble Life</h1>
  <div class="menu-card">
    <div id="menu-home">
      <button class="menu-btn" id="btn-sp">▶ &nbsp;Singleplayer</button>
      <button class="menu-btn" id="btn-mp-open">🌐 &nbsp;Multiplayer</button>
    </div>
    <div id="mp-screen">
      <h2>Multiplayer</h2>
      <label>Your Code — share this</label>
      <div class="code-box">
        <span id="my-code">····</span>
        <button class="sm-btn" id="btn-copy">Copy</button>
      </div>
      <div id="mp-status">Getting room code…</div>
      <label style="margin-top:8px">Join a Friend</label>
      <input id="room-input" type="text" placeholder="Their 4-letter code"
             maxlength="4" autocomplete="off" spellcheck="false" inputmode="text"/>
      <button id="btn-join">Join</button>
      <p class="mp-hint">Host shares 4-letter code → Friend types it → Join<br>Both must be on the multiplayer screen at the same time.</p>
      <div id="mp-error"></div>
      <button id="btn-back">← Back</button>
    </div>
  </div>
</div>

<div id="speedometer">0 KM/H</div>
<div id="hint">WASD · F enter car · Space/P punch · Drag camera</div>

<div id="mobile-ui">
  <div id="joy-zone"><div id="joy-knob"></div></div>
  <div id="cam-zone"></div>
  <div id="mobile-btns">
    <button class="m-btn" id="btn-enter">F<br><span style="font-size:7px">CAR</span></button>
    <button class="m-btn" id="btn-punch">👊</button>
  </div>
</div>

<script>document.addEventListener('contextmenu',e=>e.preventDefault());</script>

<!--
  Using PeerJS with a self-hosted fallback config.
  peerjs@1.5.4 uses metered.ca STUN/TURN by default which is reliable.
-->
<script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>

<script type="module">
import { startGame } from './game.js';

const IS_MOBILE = innerWidth<=900 || navigator.maxTouchPoints>0;
const menu      = document.getElementById('main-menu');
const menuHome  = document.getElementById('menu-home');
const mpScreen  = document.getElementById('mp-screen');
const mpError   = document.getElementById('mp-error');
const mpStatus  = document.getElementById('mp-status');
const codeEl    = document.getElementById('my-code');
const roomInput = document.getElementById('room-input');
const btnJoin   = document.getElementById('btn-join');

let peer=null, myId=null, hostConn=null, joining=false;

// Force uppercase, letters only
roomInput.addEventListener('input',()=>{
  const pos=roomInput.selectionStart;
  roomInput.value=roomInput.value.toUpperCase().replace(/[^A-Z]/g,'');
  try{roomInput.setSelectionRange(pos,pos);}catch{}
});

function setStatus(msg,isErr=false){
  mpError.style.display='none';
  mpStatus.textContent=msg;
  if(isErr){mpError.textContent=msg;mpError.style.display='block';mpStatus.textContent='';}
}

function randCode(){
  const L='ABCDEFGHJKLMNPQRSTUVWXYZ'; // no I/O confusion
  let c=''; for(let i=0;i<4;i++) c+=L[Math.floor(Math.random()*L.length)]; return c;
}

function initPeer(attempt=0){
  if(peer&&myId) return;
  if(peer){peer.destroy();peer=null;myId=null;}

  const code=randCode();
  setStatus('Getting room code…');
  codeEl.textContent='····';

  // Use the default PeerJS cloud server (peerjs.com)
  // It's the most reliable free option
  peer=new Peer(code,{
    host:'0.peerjs.com',
    port:443,
    path:'/',
    secure:true,
    debug:0,
    config:{
      iceServers:[
        {urls:'stun:stun.l.google.com:19302'},
        {urls:'stun:stun1.l.google.com:19302'},
      ]
    }
  });

  peer.on('open',id=>{
    myId=id; codeEl.textContent=id;
    setStatus('Share your code with a friend ↑');
  });

  peer.on('error',e=>{
    if(e.type==='unavailable-id'){
      peer.destroy(); peer=null; myId=null;
      if(attempt<8) setTimeout(()=>initPeer(attempt+1),300);
      else setStatus('Could not get a code. Refresh and try again.',true);
      return;
    }
    if(e.type==='peer-unavailable'){
      setStatus('Code not found — check it and try again.',true);
      resetJoinBtn(); joining=false;
      return;
    }
    console.warn('Peer:',e.type,e.message);
  });

  // HOST: incoming connection
  peer.on('connection',conn=>{
    conn.on('open',()=>{
      menu.style.display='none';
      if(IS_MOBILE) document.getElementById('mobile-ui').style.display='block';
      startGame({peer,connection:conn,isMobile:IS_MOBILE,isMultiplayer:true,isHost:true});
    });
    conn.on('error',e=>console.warn('host conn err',e));
  });
}

function resetJoinBtn(){
  btnJoin.textContent='Join'; btnJoin.disabled=false;
}

// ── Button handlers ───────────────────────────────────────────────────────
document.getElementById('btn-sp').addEventListener('click',()=>{
  menu.style.display='none';
  if(IS_MOBILE) document.getElementById('mobile-ui').style.display='block';
  startGame({peer:null,isMobile:IS_MOBILE,isMultiplayer:false});
});

document.getElementById('btn-mp-open').addEventListener('click',()=>{
  menuHome.style.display='none';
  mpScreen.style.display='flex';
  mpError.style.display='none';
  initPeer();
});

document.getElementById('btn-back').addEventListener('click',()=>{
  if(hostConn){hostConn.close();hostConn=null;}
  if(peer){peer.destroy();peer=null;myId=null;}
  joining=false;
  mpScreen.style.display='none';
  menuHome.style.display='flex';
  mpError.style.display='none';
  resetJoinBtn();
});

document.getElementById('btn-copy').addEventListener('click',()=>{
  if(myId) navigator.clipboard?.writeText(myId).then(()=>setStatus('Copied!')).catch(()=>{});
});

btnJoin.addEventListener('click',()=>{
  const code=roomInput.value.trim().toUpperCase();
  if(!/^[A-Z]{4}$/.test(code)){setStatus('Enter the 4-letter code from the host.',true);return;}
  if(!peer||!myId){setStatus('Still connecting — wait a moment.',true);return;}
  if(joining) return;
  joining=true; mpError.style.display='none';
  setStatus('Connecting…');
  btnJoin.textContent='Joining…'; btnJoin.disabled=true;

  hostConn=peer.connect(code,{reliable:true,serialization:'json'});
  let opened=false;

  hostConn.on('open',()=>{
    opened=true;
    menu.style.display='none';
    if(IS_MOBILE) document.getElementById('mobile-ui').style.display='block';
    startGame({peer,connection:hostConn,isMobile:IS_MOBILE,isMultiplayer:true,isHost:false});
  });

  hostConn.on('error',e=>{
    if(opened) return;
    hostConn.close(); hostConn=null; joining=false; resetJoinBtn();
    setStatus('Could not connect — check code or try again.',true);
  });

  hostConn.on('close',()=>{
    if(!opened){hostConn=null;joining=false;resetJoinBtn();setStatus('Host disconnected.',true);}
  });

  // 15 second timeout — longer than before
  setTimeout(()=>{
    if(!opened){
      hostConn?.close(); hostConn=null; joining=false; resetJoinBtn();
      setStatus('Timed out — make sure host is on the multiplayer screen.',true);
    }
  },15000);
});
</script>
</body>
</html>
