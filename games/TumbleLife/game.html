<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>TumbleLife 3D</title>
    <style>
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #bae6fd; 
            font-family: 'Courier New', Courier, monospace;
        }
        canvas { 
            display: block; 
            width: 100%; 
            height: 100%; 
        }

        /* ─── MICRO TRANSPARENT VINTAGE DIAL (70px) ─── */
        #speedometer {
            position: absolute;
            bottom: 12px;
            left: 50%;
            width: 70px;
            height: 70px;
            background: transparent; 
            pointer-events: none;
            opacity: 0;
            transform: translateX(-50%) translateY(15px);
            transition: opacity 0.3s ease, transform 0.3s ease;
        }

        #speedometer.active {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        .gauge-svg {
            width: 100%;
            height: 100%;
            overflow: visible;
        }

        /* Classic Gauge Hash Marks */
        .gauge-track {
            stroke: #f1f5f9;
            stroke-width: 1.5;
            fill: none;
            stroke-dasharray: 2, 3; 
            filter: drop-shadow(0px 1px 2px rgba(0,0,0,0.7));
        }

        /* Dash Numbers */
        .gauge-num {
            font-size: 9px;
            font-weight: 900;
            fill: #cbd5e1;
            font-family: 'Courier New', monospace;
            text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.9);
        }

        /* Real-time Digital Readout */
        #speed-val {
            font-size: 13px;
            font-weight: bold;
            fill: #ffffff;
            font-family: 'Courier New', monospace;
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.9);
        }

        /* Mechanical Pointer */
        #needle {
            stroke: #ea580c; 
            stroke-width: 2;
            stroke-linecap: round;
            transform-origin: 50px 50px; 
            transform: rotate(-90deg);
            transition: transform 0.04s linear;
            filter: drop-shadow(0px 1px 2px rgba(0,0,0,0.6));
        }

        .needle-cap {
            fill: #1e293b;
            stroke: #94a3b8;
            stroke-width: 1;
        }
    </style>
</head>
<body>
    
    <div id="speedometer">
        <svg viewBox="0 0 100 100" class="gauge-svg">
            <path class="gauge-track" d="M 15 50 A 35 35 0 0 1 85 50" />
            
            <text x="8" y="53" class="gauge-num" text-anchor="middle">0</text>
            <text x="50" y="11" class="gauge-num" text-anchor="middle">60</text>
            <text x="92" y="53" class="gauge-num" text-anchor="middle">120</text>
            
            <text id="speed-val" x="50" y="74" text-anchor="middle">0</text>
            
            <line id="needle" x1="50" y1="50" x2="50" y2="18" />
            <circle class="needle-cap" cx="50" cy="50" r="3" />
        </svg>
    </div>

    <script type="module" src="./game.js"></script>
</body>
</html>
