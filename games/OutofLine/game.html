<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Out of Line</title>
    <style>
        body { 
            margin: 0; overflow: hidden; background-color: #000; 
            font-family: 'Segoe UI', Tahoma, sans-serif; user-select: none; 
            /* Custom Paintbrush Cursor using an SVG data URI */
            cursor: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 11-6 6v3h3l6-6"/><path d="m11 9 4-4a2 2 0 0 1 2.8 2.8L14 12"/><path d="M15 6.5 17.5 9"/></svg>') 0 24, auto;
        }
        
        body.locked { cursor: none; }

        #crosshair {
            position: absolute; top: 50%; left: 50%;
            width: 6px; height: 6px;
            background: rgba(255, 255, 255, 0.8); border-radius: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none; z-index: 100;
            display: none; 
            box-shadow: 0 0 4px rgba(0,0,0,0.8);
        }
        body.locked #crosshair { display: block; }

        /* Sleek, angled, side-screen UI */
        #ui {
            position: absolute; top: 50%; right: 20px; 
            transform: translateY(-50%);
            color: white; font-size: 14px; text-shadow: 1px 1px 2px black; 
            pointer-events: none;
            background: linear-gradient(135deg, rgba(30,30,30,0.8), rgba(10,10,10,0.9));
            padding: 20px 30px; border-radius: 4px;
            border-left: 4px solid #88bbcc;
            box-shadow: -4px 4px 15px rgba(0,0,0,0.6);
            clip-path: polygon(0 0, 100% 5%, 100% 95%, 0 100%);
        }
        .highlight { color: #88bbcc; font-weight: bold; }
        .red-text { color: #ff4444; font-weight: bold; }
        h3 { 
            margin-top: 0; color: #fff; text-transform: uppercase; 
            letter-spacing: 2px; font-size: 16px; 
            border-bottom: 1px solid rgba(255,255,255,0.2); 
            padding-bottom: 8px; margin-bottom: 15px;
        }
    </style>
    <script async src="https://unpkg.com/es-module-shims@1.6.3/dist/es-module-shims.js"></script>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
      }
    </script>
</head>
<body>

    <div id="crosshair"></div>
    <div id="ui">
        <h3>Controls</h3>
        <span class="highlight">Click Screen</span>: Lock & Walk<br><br>
        <span class="red-text">Press ESC</span>: Free Mouse to Paint<br><br>
        <b>WASD</b>: Move Around<br><br>
        <i>Draw from START to END</i>
    </div>

    <script type="module" src="./game.js"></script>
</body>
</html>
