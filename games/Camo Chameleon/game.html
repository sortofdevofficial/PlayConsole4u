<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Camo Chameleon 3D</title>
    <style>
        body, html { margin: 0; padding: 0; overflow: hidden; width: 100%; height: 100%; font-family: sans-serif; }
        #canvas3d { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        #game-hud { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        .hud-element { pointer-events: auto; position: absolute; }
    </style>
</head>
<body>

    <!-- 1. The 3D Game World (Three.js / WebGL Render Target) -->
    <canvas id="canvas3d"></canvas>

    <!-- 2. The Interactive 2D UI Overlay -->
    <div id="game-hud">
        <!-- Reticle for aiming the color-snatch tongue -->
        <div id="crosshair" class="hud-element" style="top: 50%; left: 50%; transform: translate(-50%, -50%); width: 10px; height: 10px; border: 2px solid white; border-radius: 50%;"></div>
        
        <!-- Active Palette Slated (Snatched hex codes go here) -->
        <div id="palette-bar" class="hud-element" style="bottom: 20px; left: 50%; transform: translateX(-50%); display: flex; gap: 10px; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 8px;">
            <div class="color-slot" style="width: 50px; height: 50px; border-radius: 4px; background: #ffffff; border: 2px solid #fff;"></div>
            <div class="color-slot" style="width: 50px; height: 50px; border-radius: 4px; background: #7a7a7a;"></div>
            <div class="color-slot" style="width: 50px; height: 50px; border-radius: 4px; background: #222222;"></div>
        </div>

        <!-- Stress Meter / Match Timer -->
        <div id="top-stats" class="hud-element" style="top: 20px; left: 20px; color: white; background: rgba(0,0,0,0.6); padding: 10px; border-radius: 5px;">
            <div>TIME REMAINING: <span id="timer-val">120</span>s</div>
            <div style="margin-top: 5px;">STRESS: <span id="stress-val">0</span>%</div>
        </div>
    </div>

    <!-- Your Javascript Engine Modules -->
    <script type="importmap">
        { "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
    </script>
    <script type="module" src="game.js"></script>
</body>
</html>
