<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Camo Chameleon</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="../../firebase.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script type="importmap">{"imports":{"three":"https://unpkg.com/three@0.160.0/build/three.module.js","three/addons/":"https://unpkg.com/three@0.160.0/examples/jsm/"}}</script>
</head>
<body>
<canvas id="canvas3d"></canvas>

<div id="main-menu">
  <div class="menu-box">
    <h1 class="game-title">CAMO CHAMELEON</h1>
    <p class="subtitle">Speed Edition</p>
    
    <div id="auth-gate">
      <p class="gate-msg">Authenticating session variables...</p>
      <button id="btn-signin">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="" style="width:16px; height:16px; vertical-align:middle; margin-right:8px;">
        Sign in with Google
      </button>
      <p id="auth-msg" class="auth-msg"></p>
    </div>

    <div id="user-info" style="display:none">
      <img id="user-avatar" src="" alt="">
      <div>
        <div id="user-name"></div>
        <div class="wins-row">🏆 <span id="menu-wins">0</span> Wins <span class="dot-sep">•</span> ❤️ <span id="menu-likes">0</span> Likes</div>
      </div>
      <button id="btn-signout" class="small-btn">Sign Out</button>
    </div>

    <div class="controls-list">
      <p><b>WASD</b> — Extreme Run</p>
      <p><b>Space ×2</b> — High Velocity Jump</p>
      <p><b>Shift</b> — Super Sprint</p>
      <p><b>F</b> — Freeze Tag Toggle</p>
    </div>

    <button id="btn-play" disabled>Connecting...</button>
    <p id="lobby-status" class="lobby-status"></p>
  </div>
</div>

<div id="hud" style="display:none">
  <div class="hud-panel" id="stats-panel">
    <img id="hud-avatar" src="" alt="">
    <div>
      <div id="hud-username">—</div>
      <div class="wins-row">🏆 <span id="hud-wins">0</span></div>
    </div>
  </div>

  <div class="hud-panel" id="round-panel">
    <div id="round-label">Lobby</div>
    <div id="round-timer"></div>
  </div>

  <div class="hud-panel" id="role-panel" style="display:none">
    <div id="role-badge"></div>
  </div>

  <div class="hud-panel" id="sidebar-tools">
    <div class="sidebar-section">
      <span class="section-title">Color</span>
      <div class="color-picker-wrapper">
        <input type="color" id="html-color-picker" value="#ef4444">
        <span id="color-hex-label">#EF4444</span>
      </div>
      <div class="swatches">
        <div class="swatch" style="background:#ef4444" data-c="#ef4444"></div>
        <div class="swatch" style="background:#f59e0b" data-c="#f59e0b"></div>
        <div class="swatch" style="background:#10b981" data-c="#10b981"></div>
        <div class="swatch" style="background:#3b82f6" data-c="#3b82f6"></div>
        <div class="swatch" style="background:#a855f7" data-c="#a855f7"></div>
        <div class="swatch" style="background:#f43f5e" data-c="#f43f5e"></div>
      </div>
    </div>
    <div class="sidebar-section">
      <span class="section-title">Tool</span>
      <button class="tool-btn active" data-tool="brush">🎨 Brush</button>
      <button class="tool-btn" data-tool="bucket">🪣 Bucket</button>
    </div>
    <div class="sidebar-section">
      <span class="section-title">Size</span>
      <div class="size-group">
        <button class="size-btn" data-r="8">S</button>
        <button class="size-btn active" data-r="20">M</button>
        <button class="size-btn" data-r="40">L</button>
      </div>
    </div>
  </div>

  <div class="hud-panel" id="players-panel">
    <div class="panel-label">PLAYERS</div>
    <div id="players-list"></div>
  </div>

  <div id="freeze-indicator">❄️ FROZEN</div>

  <div id="round-overlay" style="display:none">
    <div id="overlay-title"></div>
    <div id="overlay-sub"></div>
  </div>
  
  <div id="honor-screen" style="display:none">
    <div class="honor-box">
      <h2 class="honor-title">HONOR RATING</h2>
      <div id="honor-list"></div>
    </div>
  </div>

  <div id="mobile-controls">
    <div id="joystick-zone"><div id="joystick-base"><div id="joystick-knob"></div></div></div>
    <div id="action-btns">
      <button class="mob-btn" id="mob-jump">Jump</button>
      <button class="mob-btn" id="mob-sprint">Sprint</button>
      <button class="mob-btn" id="mob-freeze">Freeze</button>
    </div>
  </div>

  <button id="mob-paint-toggle">🎨</button>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
