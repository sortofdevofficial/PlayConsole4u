<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Camo Chameleon</title>
<link rel="stylesheet" href="style.css">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="../../firebase.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
</script>
</head>
<body>
<canvas id="canvas3d"></canvas>

<div id="main-menu">
  <div class="menu-box">
    <h1 class="game-title">CAMO CHAMELEON</h1>
    <p class="subtitle">Next-Gen Edition</p>

    <div id="auth-gate">
      <button id="btn-signin" class="menu-btn primary">SIGN IN WITH GOOGLE</button>
    </div>

    <div id="user-info" style="display:none;">
      <img id="user-avatar" src="" alt="Avatar">
      <div>
        <div id="user-name">Loading...</div>
        <div class="menu-stats">🏆 Wins: <span id="menu-wins">0</span> | ❤️ Likes: <span id="menu-likes">0</span></div>
      </div>
    </div>

    <button id="btn-play" class="menu-btn action" disabled>Connecting...</button>
  </div>
</div>

<div id="hud" style="display:none;">
  <div class="sidebar-panel">
    <div class="sidebar-section">
      <span class="section-title">Tool Configuration</span>
      <button class="tool-btn active" data-tool="brush">🎨 Active Brush</button>
    </div>
    <div class="sidebar-section">
      <span class="section-title">Brush Dimensions</span>
      <div class="size-group">
        <button class="size-btn" data-r="8">S</button>
        <button class="size-btn active" data-r="20">M</button>
        <button class="size-btn" data-r="40">L</button>
      </div>
    </div>
  </div>

  <div class="hud-panel" id="players-panel">
    <div class="panel-label">PLAYERS IN ROOM</div>
    <div id="players-list"></div>
  </div>

  <div id="freeze-indicator" style="display:none;">❄️ PLAYER FROZEN — Press F or Tap Unfreeze</div>

  <div id="round-overlay" style="display:none">
    <div id="overlay-title"></div>
    <div id="overlay-sub"></div>
  </div>
</div>

<div id="mobile-controls" style="display:none;">
  <div id="joystick-zone">
    <div id="joystick-base">
      <div id="joystick-knob"></div>
    </div>
  </div>
  <div id="action-btns">
    <button id="mob-btn-freeze" class="mob-btn">❄️ Freeze</button>
    <button id="mob-btn-jump" class="mob-btn">🚀 Jump</button>
  </div>
</div>

<script type="module" src="main.js"></script>
</body>
</html>
