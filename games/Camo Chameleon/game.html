<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Camo Chameleon: Studio</title>
    <link rel="stylesheet" href="style.css">
    
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>
</head>
<body>
    <canvas id="canvas3d"></canvas>

    <div id="main-menu">
        <div class="menu-box">
            <h1 class="game-title">CAMO CHAMELEON</h1>
            <p class="subtitle">Studio Edition</p>
            
            <div class="controls-list">
                <p><b>WASD</b> - Move Character</p>
                <p><b>SPACE</b> - Jump</p>
                <p><b>SHIFT</b> - Sprint</p>
                <p><b>Left-Click & Drag</b> - Pan Camera</p>
                <p><b>Scroll Wheel</b> - Zoom In/Out</p>
            </div>

            <button id="btn-play">START GAME</button>
        </div>
    </div>

    <div id="hud" style="display: none;">
        <div class="hud-panel" id="sidebar-tools">
            <div class="sidebar-section">
                <span class="section-title">Active Color</span>
                <div class="color-picker-wrapper">
                    <input type="color" id="html-color-picker" value="#38bdf8">
                    <span id="color-hex-label">#38BDF8</span>
                </div>
            </div>

            <div class="sidebar-section">
                <span class="section-title">Tools</span>
                <button class="tool-btn active" data-tool="brush">🎨 Brush</button>
                <button class="tool-btn" data-tool="bucket">🪣 Fill Bucket</button>
                <button class="tool-btn" data-tool="eraser">🧼 Eraser</button>
                <div class="tool-divider"></div>
                <button class="tool-btn" data-tool="picker">💧 Eyedropper</button>
            </div>

            <div class="sidebar-section">
                <span class="section-title">Brush Size</span>
                <div class="size-group">
                    <button class="size-btn" data-radius="12">S</button>
                    <button class="size-btn active" data-radius="32">M</button>
                    <button class="size-btn" data-radius="64">L</button>
                </div>
            </div>
        </div>
    </div>

    <script type="module" src="main.js"></script>
</body>
</html>
