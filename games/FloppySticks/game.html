<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<link rel="icon" type="image/png" href="../../favicon.png">
<title>FloppySticks — Nature Brawl</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#87CEEB;font-family:'Segoe UI',sans-serif;user-select:none;-webkit-user-select:none;touch-action:none}
canvas{display:block;width:100vw;height:100vh;position:fixed;top:0;left:0}

#menu{position:fixed;inset:0;background:linear-gradient(180deg,rgba(135,206,235,.90),rgba(240,253,255,.97));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:10;transition:opacity .4s}
h1{color:#2c3e50;font-size:clamp(34px,8vw,54px);font-weight:800;letter-spacing:1px;text-shadow:0 4px 10px rgba(0,0,0,.1);text-align:center;margin-bottom:3px}
.sub{color:#7f8c8d;font-size:clamp(10px,2vw,13px);letter-spacing:3px;text-transform:uppercase;font-weight:700;margin-bottom:20px}

#wl-card{display:none;flex-direction:row;gap:10px;margin-bottom:16px;background:rgba(255,255,255,.88);border-radius:16px;padding:12px 22px;box-shadow:0 4px 14px rgba(0,0,0,.08)}
.wl-s{text-align:center}
.wl-v{font-size:22px;font-weight:800}
.wl-l{font-size:10px;font-weight:700;color:#7f8c8d;letter-spacing:.5px;margin-top:1px}
#wl-w{color:#2ecc71}#wl-l{color:#e74c3c}#wl-r{color:#3498db}
.wl-d{width:1px;background:#e0e0e0;align-self:stretch;margin:0 2px}

#auth-strip{display:flex;flex-direction:column;align-items:center;gap:6px;margin-bottom:12px}
#btn-si{background:#4285f4;color:#fff;border:none;border-radius:20px;padding:8px 18px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s;box-shadow:0 2px 8px rgba(66,133,244,.3)}
#btn-si:hover{background:#3367d6;transform:translateY(-1px)}
#signed-in{display:none;align-items:center;gap:8px;background:rgba(255,255,255,.88);border-radius:20px;padding:6px 12px 6px 6px;box-shadow:0 2px 8px rgba(0,0,0,.07)}
#u-av{width:28px;height:28px;border-radius:50%;object-fit:cover}
#u-nm{font-size:12px;font-weight:700;color:#2c3e50}
#btn-so{background:none;border:1px solid #ddd;border-radius:8px;padding:3px 8px;font-size:10px;color:#7f8c8d;cursor:pointer;font-family:inherit;transition:.15s}
#btn-so:hover{background:#fdf0f0;border-color:#e74c3c;color:#e74c3c}

.mbtn{width:min(280px,80vw);padding:14px;margin:5px;font-size:clamp(12px,3vw,14px);font-weight:bold;text-transform:uppercase;letter-spacing:1px;border:none;border-radius:30px;cursor:pointer;transition:all .2s;font-family:inherit;box-shadow:0 4px 12px rgba(0,0,0,.08)}
.g{background:#2ecc71;color:#fff}.g:hover{background:#27ae60;transform:translateY(-2px)}
.b{background:#3498db;color:#fff}.b:hover{background:#2980b9;transform:translateY(-2px)}
.gr{background:#ecf0f1;color:#7f8c8d;font-size:11px!important;margin-top:2px}.gr:hover{background:#dfe6e9}

#om{display:none;position:fixed;inset:0;z-index:20;background:rgba(0,0,0,.45);backdrop-filter:blur(6px);align-items:center;justify-content:center}
#om.open{display:flex}
.ombox{background:#fff;border-radius:20px;padding:26px;width:min(380px,92vw);display:flex;flex-direction:column;gap:13px;box-shadow:0 24px 60px rgba(0,0,0,.2);animation:pop .2s ease both}
@keyframes pop{from{opacity:0;transform:scale(.95) translateY(8px)}}
.omtit{font-size:19px;font-weight:800;color:#2c3e50;text-align:center}
.omsub{font-size:12px;color:#7f8c8d;text-align:center;line-height:1.5}
.omtabs{display:flex;gap:8px}
.omtab{flex:1;padding:10px;border:2px solid #e0e0e0;background:#f8f9fa;border-radius:12px;font-size:13px;font-weight:700;cursor:pointer;transition:.15s;color:#7f8c8d;font-family:inherit}
.omtab.on{border-color:#3498db;background:#ebf5fb;color:#2980b9}
.ompanel{display:none;flex-direction:column;gap:10px}.ompanel.on{display:flex}
.codebox{background:#f0f9ff;border:2px dashed #3498db;border-radius:12px;padding:14px;text-align:center}
.codeval{font-size:44px;font-weight:800;color:#2980b9;letter-spacing:10px}
.codehint{font-size:11px;color:#7f8c8d;margin-top:3px}
.ominp{width:100%;padding:13px;border:2px solid #e0e0e0;border-radius:12px;font-size:24px;font-weight:800;letter-spacing:6px;text-align:center;text-transform:uppercase;outline:none;font-family:inherit;transition:border-color .15s}
.ominp:focus{border-color:#3498db}
.ombtn{padding:12px;border:none;border-radius:12px;font-size:13px;font-weight:800;cursor:pointer;transition:.18s;letter-spacing:1px;font-family:inherit}
.ombtn.b{background:#3498db;color:#fff}.ombtn.b:hover{background:#2980b9;transform:translateY(-1px)}
.ombtn.gr{background:#ecf0f1;color:#7f8c8d}.ombtn.gr:hover{background:#dfe6e9}
.omst{font-size:13px;font-weight:700;text-align:center;min-height:20px;padding:8px;border-radius:8px}
.omst.wait{color:#e67e22;background:#fef9f0}.omst.conn{color:#3498db;background:#ebf5fb}
.omst.ok{color:#27ae60;background:#eafaf1}.omst.err{color:#e74c3c;background:#fdedec}
.sp{display:inline-block;width:11px;height:11px;border:2px solid currentColor;border-top-color:transparent;border-radius:50%;animation:spin .7s linear infinite;margin-right:5px;vertical-align:middle}
@keyframes spin{to{transform:rotate(360deg)}}

#hud{position:fixed;top:0;left:0;width:100%;padding:clamp(8px,2vw,14px);display:none;justify-content:space-between;align-items:flex-start;pointer-events:none;z-index:5;box-sizing:border-box}
.hp{background:rgba(255,255,255,.92);padding:clamp(5px,1.5vw,9px) clamp(7px,2vw,11px);border-radius:12px;width:clamp(130px,21vw,210px);box-shadow:0 4px 16px rgba(0,0,0,.06);border:1px solid rgba(0,0,0,.04)}
.hptit{color:#2c3e50;font-size:clamp(8px,1.4vw,11px);font-weight:bold;letter-spacing:1px;margin-bottom:4px;display:flex;justify-content:space-between}
.hpbadge{background:#34495e;color:#fff;padding:1px 5px;border-radius:7px;font-size:clamp(8px,1.1vw,10px)}
.hpbg{width:100%;height:8px;background:#eaeded;border-radius:5px;overflow:hidden}
.hpbar{height:100%;width:100%;transition:width .1s}
#p-hp{background:#2ecc71}#b-hp{background:#e74c3c}
.wptag{margin-top:4px;color:#7f8c8d;font-size:clamp(7px,1.1vw,10px);font-weight:600}
#droptimer{background:rgba(44,62,80,.9);color:#fff;padding:7px 14px;border-radius:18px;font-size:clamp(9px,1.4vw,11px);font-weight:bold;letter-spacing:1px;box-shadow:0 3px 10px rgba(0,0,0,.14);text-align:center;min-width:95px;white-space:nowrap;align-self:center}
#mbadge{background:rgba(52,152,219,.9);color:#fff;padding:4px 10px;border-radius:9px;font-size:10px;font-weight:800;letter-spacing:1px;margin-top:4px;text-align:center}

#mc{position:fixed;bottom:max(14px,env(safe-area-inset-bottom,14px));left:0;width:100%;display:none;justify-content:space-between;padding:0 18px;pointer-events:none;z-index:6}
.bg{display:flex;gap:clamp(7px,3vw,14px);pointer-events:none}
.t{width:clamp(50px,14vw,63px);height:clamp(50px,14vw,63px);background:rgba(255,255,255,.55);border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;color:#2c3e50;font-size:clamp(15px,5vw,21px);border:2px solid rgba(0,0,0,.15);pointer-events:auto;box-shadow:0 3px 9px rgba(0,0,0,.1);-webkit-tap-highlight-color:transparent}
.t:active{background:rgba(255,255,255,.85);transform:scale(.92)}
#ver{position:fixed;bottom:7px;right:10px;color:rgba(0,0,0,.22);font-size:9px;font-weight:bold;pointer-events:none;z-index:8}
</style>
</head>
<body>
<div id="ver">v1.3</div>

<div id="menu">
  <h1>FloppySticks</h1>
  <div class="sub">Nature Brawl</div>

  <div id="wl-card">
    <div class="wl-s"><div class="wl-v" id="wl-w">0</div><div class="wl-l">WINS</div></div>
    <div class="wl-d"></div>
    <div class="wl-s"><div class="wl-v" id="wl-l">0</div><div class="wl-l">LOSSES</div></div>
    <div class="wl-d"></div>
    <div class="wl-s"><div class="wl-v" id="wl-r">—</div><div class="wl-l">W/L</div></div>
  </div>

  <div id="auth-strip">
    <div id="auth-out"><button class="mbtn b" id="btn-si">🔑 Sign in to save W/L</button></div>
    <div id="signed-in">
      <img id="u-av" src="" alt="">
      <span id="u-nm">—</span>
      <button id="btn-so">Sign out</button>
    </div>
  </div>

  <button class="mbtn g" id="start-btn">🥊 vs AI (Local)</button>
  <button class="mbtn b" id="online-btn">🌐 Online Match</button>
  <button class="mbtn gr" onclick="history.back()">← Back</button>
</div>

<div id="om">
  <div class="ombox">
    <div class="omtit">🌐 Online Match</div>
    <div class="omsub">Share the 4-letter code with a friend. No account needed.</div>
    <div class="omtabs">
      <button class="omtab on" id="th" onclick="switchTab('host')">🏠 Host</button>
      <button class="omtab"    id="tj" onclick="switchTab('join')">🔗 Join</button>
    </div>
    <div class="ompanel on" id="ph">
      <div class="codebox" id="codebox"><div style="font-size:13px;color:#7f8c8d">Generating…</div></div>
      <div class="omst wait" id="hst"><span class="sp"></span>Waiting for opponent…</div>
      <button class="ombtn gr" onclick="closeOM()">Cancel</button>
    </div>
    <div class="ompanel" id="pj">
      <input class="ominp" id="jinp" type="text" maxlength="4" placeholder="ABCD"
             autocomplete="off" spellcheck="false"
             oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
      <button class="ombtn b" onclick="joinGame()">Connect →</button>
      <div class="omst" id="jst" style="display:none"></div>
      <button class="ombtn gr" onclick="closeOM()">Cancel</button>
    </div>
  </div>
</div>

<div id="hud">
  <div class="hp">
    <div class="hptit"><span id="plbl">YOU</span><span id="psc" class="hpbadge">0 pts</span></div>
    <div class="hpbg"><div class="hpbar" id="p-hp"></div></div>
    <div class="wptag">WEAPON: <span id="pwp" style="color:#2c3e50">NONE</span></div>
  </div>
  <div style="display:flex;flex-direction:column;align-items:center">
    <div id="droptimer">DROP: --</div>
    <div id="mbadge" style="display:none">ONLINE</div>
  </div>
  <div class="hp" style="text-align:right">
    <div class="hptit" style="flex-direction:row-reverse"><span id="olbl">AI</span><span id="osc" class="hpbadge">0 pts</span></div>
    <div class="hpbg"><div class="hpbar" id="b-hp" style="margin-left:auto"></div></div>
    <div class="wptag">WEAPON: <span id="bwp" style="color:#962d22">NONE</span></div>
  </div>
</div>

<div id="mc">
  <div class="bg">
    <div class="t" id="btn-left">←</div>
    <div class="t" id="btn-right">→</div>
  </div>
  <div class="bg">
    <div class="t" id="btn-jump">↑</div>
    <div class="t" id="btn-attack" style="background:rgba(46,204,113,.55);font-size:13px;font-weight:800">HIT</div>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
<script src="firebase.js"></script>
<script src="game.js"></script>
<script>
// Auth UI — wired after FB is loaded
function showWL(w,l){
  document.getElementById('wl-w').textContent=w;
  document.getElementById('wl-l').textContent=l;
  document.getElementById('wl-r').textContent=l>0?(w/l).toFixed(2):w>0?'∞':'—';
  document.getElementById('wl-card').style.display='flex';
}

FB.onAuthChange(async u=>{
  document.getElementById('auth-out').style.display=u?'none':'block';
  document.getElementById('signed-in').style.display=u?'flex':'none';
  document.getElementById('wl-card').style.display=u?'flex':'none';
  if(u){
    document.getElementById('u-nm').textContent=u.displayName||'Player';
    const av=document.getElementById('u-av');
    av.src=u.photoURL||'';av.style.display=u.photoURL?'block':'none';
    const s=await FB.getMatchStats(u.uid);showWL(s.w||0,s.l||0);
  }
});
document.getElementById('btn-si').onclick=()=>FB.signInGoogle().catch(()=>{});
document.getElementById('btn-so').onclick=()=>FB.signOut();
</script>
</body>
</html>
