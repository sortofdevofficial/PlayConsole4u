<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/png" href="../../favicon.png">
  <title>FloppySticks — Nature Brawl</title>
  <link rel="stylesheet" href="css/game.css">
</head>
<body>

<div id="ver">v3.0</div>

<div id="dmg-overlay"></div>

<div id="menu">
  <div id="menu-bg"></div>
  <div id="menu-glow"></div>
  <div id="menu-content">

    <h1 class="game-title">FloppySticks</h1>
    <div class="game-sub">Nature Brawl</div>

    <div id="wl-card">
      <div class="wl-stat">
        <div class="wl-val" id="wl-wins">0</div>
        <div class="wl-lbl">WINS</div>
      </div>
      <div class="wl-div"></div>
      <div class="wl-stat">
        <div class="wl-val" id="wl-losses">0</div>
        <div class="wl-lbl">LOSSES</div>
      </div>
      <div class="wl-div"></div>
      <div class="wl-stat">
        <div class="wl-val" id="wl-ratio">—</div>
        <div class="wl-lbl">RATIO</div>
      </div>
    </div>

    <div id="auth-strip">
      <div id="auth-out">
        <button class="mbtn blue" id="btn-signin">🔑 Sign in to save W/L</button>
      </div>
      <div id="signed-in">
        <img id="u-avatar" src="" alt="">
        <span id="u-name">—</span>
        <button id="btn-signout">Sign out</button>
      </div>
    </div>

    <button class="mbtn green" id="start-btn" onclick="startBot()">🥊 vs AI</button>
    <button class="mbtn blue"  id="online-btn" onclick="openOnlineModal()">🌐 Online Match</button>
    <button class="mbtn grey"  onclick="history.back()">← Back</button>

  </div>
</div>

<div id="online-modal">
  <div class="om-box">
    <div class="om-title">🌐 Online Arena</div>
    <div class="om-sub">Host a custom room, join via code, or queue up for matchmaking.</div>
    <div class="om-tabs">
      <button class="om-tab active" id="tab-host" onclick="switchTab('host')">🏠 Host</button>
      <button class="om-tab"        id="tab-join" onclick="switchTab('join')">🔗 Join</button>
      <button class="om-tab"        id="tab-mm"   onclick="switchTab('mm')">⚡ Matchmaking</button>
    </div>

    <div class="om-panel active" id="panel-host">
      <div class="om-code-box" id="host-code-box">
        <div style="font-size:13px;color:rgba(0,0,0,.3)">Generating…</div>
      </div>
      <div class="om-status waiting" id="host-status">
        <span class="spin"></span>Waiting for opponent…
      </div>
      <button class="om-btn grey" onclick="closeOnlineModal()">Cancel</button>
    </div>

    <div class="om-panel" id="panel-join">
      <input class="om-input" id="join-input" type="text" maxlength="4"
             placeholder="ABCD" autocomplete="off" spellcheck="false"
             oninput="this.value=this.value.toUpperCase().replace(/[^A-Z0-9]/g,'')">
      <button class="om-btn blue" onclick="joinGame()">Connect →</button>
      <div class="om-status" id="join-status" style="display:none"></div>
      <button class="om-btn grey" onclick="closeOnlineModal()">Cancel</button>
    </div>

    <div class="om-panel" id="panel-mm">
      <div class="om-status waiting" id="mm-status">Ready to find local challengers...</div>
      <button class="om-btn orange" id="mm-action-btn" onclick="toggleMM()">Find Match</button>
      <button class="om-btn grey" onclick="closeOnlineModal()">Cancel</button>
    </div>
  </div>
</div>

<div id="hud">
  <div class="hp">
    <div class="hp-title">
      <span id="p-label">YOU</span>
      <span id="p-score" class="hp-badge">0 pts</span>
    </div>
    <div class="hp-bar-bg"><div class="hp-bar" id="p-hp"></div></div>
    <div class="wp-tag">WEAPON: <span id="p-weapon">NONE</span></div>
  </div>

  <div style="display:flex;flex-direction:column;align-items:center">
    <div id="drop-timer">DROP: --</div>
    <div id="mode-badge" style="display:none">ONLINE</div>
  </div>

  <div class="hp" style="text-align:right">
    <div class="hp-title" style="flex-direction:row-reverse">
      <span id="o-label">AI</span>
      <span id="o-score" class="hp-badge">0 pts</span>
    </div>
    <div class="hp-bar-bg">
      <div class="hp-bar" id="b-hp" style="margin-left:auto"></div>
    </div>
    <div class="wp-tag" style="text-align:right">WEAPON: <span id="b-weapon">NONE</span></div>
  </div>
</div>

<div id="mob-ctrl">
  <div class="btn-grp">
    <div class="touch" id="btn-left">←</div>
    <div class="touch" id="btn-right">→</div>
  </div>
  <div class="btn-grp">
    <div class="touch" id="btn-jump">↑</div>
    <div class="touch" id="btn-attack">HIT</div>
  </div>
</div>

<canvas id="gameCanvas"></canvas>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="../../firebase.js"></script>

<script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>

<script src="js/entities/stickman.js"></script>
<script src="js/net/network.js"></script>
<script src="js/engine/draw.js"></script>
<script src="js/engine/game.js"></script>

<script>
  window.currentUsername = "Player_" + Math.floor(1000 + Math.random() * 9000);

  function showWL(w = 0, l = 0) {
    document.getElementById('wl-wins').textContent   = w;
    document.getElementById('wl-losses').textContent = l;
    document.getElementById('wl-ratio').textContent  = l > 0 ? (w / l).toFixed(2) : (w > 0 ? '∞' : '—');
    document.getElementById('wl-card').style.display = 'flex';
  }

  window.FB.onAuthChange(async user => {
    document.getElementById('auth-out').style.display  = user ? 'none'  : 'block';
    document.getElementById('signed-in').style.display = user ? 'flex'  : 'none';
    if (user) {
      window.currentUsername = user.displayName || "Player";
      document.getElementById('u-name').textContent     = window.currentUsername;
      document.getElementById('u-avatar').src           = user.photoURL    || '';
      document.getElementById('u-avatar').style.display = user.photoURL    ? 'block' : 'none';
      const s = await window.FB.getMatchStats(user.uid).catch(() => ({ w: 0, l: 0 }));
      showWL(s.w || 0, s.l || 0);
    } else {
      window.currentUsername = "Guest_" + Math.floor(1000 + Math.random() * 9000);
      document.getElementById('wl-card').style.display = 'none';
    }
  });

  document.getElementById('btn-signin').onclick  = () => window.FB.signInGoogle().catch(() => {});
  document.getElementById('btn-signout').onclick = () => window.FB.signOut();
  window.showWL = showWL;
</script>

</body>
</html>
