<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Premium Server Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    /* Premium White Shade Theme with Tech Color Accents */
    :root {
      --bg: #ffffff;
      --surface: #f8f9fa;
      --surface-hover: #f1f3f5;
      --border: #e9ecef;
      --text-main: #1a1d20;
      --text-muted: #6c757d;
      --green: #22c55e;
      --accent-gradient: linear-gradient(135deg, #6366f1, #a855f7);
      --accent-light: rgba(99, 102, 241, 0.08);
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: 'Plus Jakarta Sans', sans-serif;
      background: transparent;
      margin: 0;
      padding: 0;
      overflow: hidden;
    }

    .widget-container {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 18px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      gap: 12px;
      height: 415px;
    }

    /* Server Profile Header Section */
    .profile-header {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .server-icon-container {
      position: relative;
      width: 46px;
      height: 46px;
      flex-shrink: 0;
    }

    .server-icon-live {
      width: 100%;
      height: 100%;
      border-radius: 14px;
      object-fit: cover;
      background: var(--accent-gradient);
      border: 2px solid #ffffff;
      box-shadow: 0 4px 12px rgba(99, 102, 241, 0.25);
    }

    .profile-info {
      flex: 1;
      min-width: 0;
    }

    .server-title {
      font-size: 15px;
      font-weight: 800;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.2;
    }

    .server-desc {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 3px;
      line-height: 1.3;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* Live Analytics Counter */
    .metrics-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 8px 12px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      color: var(--text-main);
      flex-shrink: 0;
    }

    .live-pulse {
      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--green);
    }

    .pulse-dot {
      width: 6px;
      height: 6px;
      background-color: var(--green);
      border-radius: 50%;
      animation: pulseGlow 2s infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { transform: scale(1); opacity: 1; box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
      50% { transform: scale(1.1); opacity: 0.8; box-shadow: 0 0 0 5px rgba(34, 197, 94, 0); }
    }

    /* 5 Hand-Picked Server Traits System */
    .traits-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 4px;
      flex-shrink: 0;
    }

    .trait-badge {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 6px 2px;
      text-align: center;
      font-size: 8.5px;
      font-weight: 700;
      color: var(--text-muted);
      transition: all 0.2s ease;
      white-space: nowrap;
      overflow: hidden;
    }

    .trait-badge:hover {
      background: var(--accent-light);
      border-color: rgba(99, 102, 241, 0.2);
      color: #6366f1;
      transform: translateY(-1px);
    }

    .trait-badge div {
      font-size: 13px;
      margin-bottom: 2px;
    }

    /* Interactive List Controls Styling */
    .section-label {
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
      flex-shrink: 0;
    }

    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Active Members Scroll Deck */
    .member-deck {
      flex: 1;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 2px;
    }

    .member-deck::-webkit-scrollbar { width: 3px; }
    .member-deck::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

    .user-card {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 6px 8px;
      background: var(--surface);
      border: 1px solid transparent;
      border-radius: 10px;
      transition: all 0.2s ease;
    }

    .user-card:hover {
      background: var(--surface-hover);
      border-color: var(--border);
    }

    .avatar-block {
      position: relative;
      display: flex;
    }

    .user-avatar {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      object-fit: cover;
      background: var(--border);
    }

    .live-status {
      width: 7px;
      height: 7px;
      background: var(--green);
      border: 1.5px solid #fff;
      border-radius: 50%;
      position: absolute;
      bottom: -1px;
      right: -1px;
    }

    .user-meta {
      flex: 1;
      min-width: 0;
    }

    .user-name {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-main);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .user-activity {
      font-size: 9px;
      font-weight: 700;
      color: #a855f7;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-top: 1px;
    }

    /* Bottom Action Trigger Button */
    .join-trigger-btn {
      background: var(--accent-gradient);
      color: #ffffff;
      border: none;
      width: 100%;
      padding: 12px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      text-decoration: none;
      flex-shrink: 0;
      box-shadow: 0 4px 15px rgba(168, 85, 247, 0.25);
      transition: all 0.2s ease;
    }
    
    .join-trigger-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(168, 85, 247, 0.35);
      filter: brightness(1.03);
    }
  </style>
</head>
<body>

  <div class="widget-container">
    
    <div class="profile-header">
      <div class="server-icon-container">
        <img id="live-server-icon" class="server-icon-live" src="" alt="Server Icon">
      </div>
      <div class="profile-info">
        <div class="server-title" id="widget-server-name">Loading Server...</div>
        <div class="server-desc" id="widget-server-desc">Welcome to our development and gaming community hub! Meet creators, get support, and share projects.</div>
      </div>
    </div>

    <div class="metrics-bar">
      <span>Verified Roles: <span id="metric-roles" style="color: #6366f1; font-weight:800;">Active</span></span>
      <div class="live-pulse">
        <div class="pulse-dot"></div>
        <span id="metric-online">0 ONLINE</span>
      </div>
    </div>

    <div class="traits-grid">
      <div class="trait-badge" title="Active casual chats"><div>💬</div>Chitchat</div>
      <div class="trait-badge" title="Fun gaming and bot rooms"><div>🎉</div>Fun Lobbies</div>
      <div class="trait-badge" title="Code sharing & software builds"><div>💻</div>Dev</div>
      <div class="trait-badge" title="Network of technical builders"><div>🚀</div>Developers</div>
      <div class="trait-badge" title="Dedicated help nodes"><div>⚡</div>Support</div>
    </div>

    <div class="section-label">Online Crew</div>

    <div class="member-deck" id="widget-member-deck">
      </div>

    <a class="join-trigger-btn" id="widget-join-link" href="https://discord.gg/dS4pgC9J5H" target="_blank" rel="noopener">
      JOIN DEVELOPER HUB
    </a>
  </div>

  <script>
    const TARGET_GUILD_ID = "1503297362246897694";
    const API_FEED_ENDPOINT = `https://discord.com/api/guilds/${TARGET_GUILD_ID}/widget.json`;

    async function streamServerMetrics() {
      try {
        const networkResponse = await fetch(API_FEED_ENDPOINT);
        if (!networkResponse.ok) throw new Error("Server data array drop");
        
        const runtimePayload = await networkResponse.json();

        // Server Identity & Dynamic UI Initials Avatar Fallback
        document.getElementById("widget-server-name").textContent = runtimePayload.name;
        
        const iconNode = document.getElementById("live-server-icon");
        iconNode.src = `https://ui-avatars.com/api/?name=${encodeURIComponent(runtimePayload.name)}&background=6366f1&color=fff&bold=true&font-size=0.33&rounded=false`;

        // Update Presence online metrics
        document.getElementById("metric-online").textContent = `${runtimePayload.presence_count} ONLINE`;
        
        if (runtimePayload.instant_invite) {
          document.getElementById("widget-join-link").href = runtimePayload.instant_invite;
        }

        const deckContainer = document.getElementById("widget-member-deck");
        if (!deckContainer) return;
        
        deckContainer.innerHTML = ""; 

        const connectedUsers = runtimePayload.members || [];
        if (connectedUsers.length === 0) {
          deckContainer.innerHTML = `<div class="user-name" style="text-align:center; padding:15px; font-size:11px; color:var(--text-muted);">No members online right now</div>`;
          return;
        }

        // Display top 4 users perfectly to fit layout dimensions cleanly
        connectedUsers.slice(0, 4).forEach(user => {
          const cardElement = document.createElement("div");
          cardElement.className = "user-card";

          const avatarBlock = document.createElement("div");
          avatarBlock.className = "avatar-block";

          const imgNode = document.createElement("img");
          imgNode.className = "user-avatar";
          imgNode.src = user.avatar_url;
          imgNode.alt = user.username;
          imgNode.loading = "lazy";

          const markerNode = document.createElement("div");
          markerNode.className = "live-status";
          
          if(user.game) {
            markerNode.style.background = "#a855f7";
          }

          avatarBlock.appendChild(imgNode);
          avatarBlock.appendChild(markerNode);

          const metaBlock = document.createElement("div");
          metaBlock.className = "user-meta";

          const nameNode = document.createElement("div");
          nameNode.className = "user-name";
          nameNode.textContent = user.username;
          metaBlock.appendChild(nameNode);

          if (user.game && user.game.name) {
            const activityNode = document.createElement("div");
            activityNode.className = "user-activity";
            activityNode.textContent = `💻 ${user.game.name}`;
            metaBlock.appendChild(activityNode);
          }

          cardElement.appendChild(avatarBlock);
          cardElement.appendChild(metaBlock);
          deckContainer.appendChild(cardElement);
        });

      } catch (err) {
        console.warn("[Widget Stream Error]:", err.message);
        document.getElementById("widget-server-name").textContent = "DEVELOPER COMMUNITY";
        document.getElementById("metric-online").textContent = "LIVE DATA";
      }
    }

    // Initialize Widget Loop Sequence 
    streamServerMetrics();
    setInterval(streamServerMetrics, 35000);
  </script>
</body>
</html>
