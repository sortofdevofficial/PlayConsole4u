<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YouTube Premium Widget</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@500;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f8f9fa;
      --border: #e9ecef;
      --text-main: #1a1d20;
      --text-muted: #6c757d;
      --yt-red: #ff0000;
      --shadow: 0 10px 30px rgba(0, 0, 0, 0.04);
    }
    
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: transparent; 
      padding: 4px; 
      overflow: hidden; 
    }
    
    .widget {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      box-shadow: var(--shadow);
      transition: all 0.3s ease;
    }

    .widget:hover {
      box-shadow: 0 15px 40px rgba(0, 0, 0, 0.08);
      border-color: #dee2e6;
    }

    .header { display: flex; align-items: center; justify-content: space-between; }
    
    .profile { display: flex; align-items: center; gap: 12px; }
    
    .avatar { 
      width: 44px; height: 44px; border-radius: 14px; 
      object-fit: cover; background: var(--surface);
    }
    
    .info { display: flex; flex-direction: column; }
    .name { color: var(--text-main); font-size: 14px; font-weight: 800; }
    .handle { color: var(--text-muted); font-size: 11px; font-weight: 600; }
    
    .live-badge {
      display: flex; align-items: center; gap: 5px;
      background: var(--surface); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 8px; color: var(--text-main); 
      font-size: 10px; font-weight: 800; letter-spacing: 0.5px;
    }
    
    .dot { width: 6px; height: 6px; background: var(--yt-red); border-radius: 50%; box-shadow: 0 0 8px var(--yt-red); }

    .stats { text-align: center; margin: 4px 0; }
    .count { color: var(--text-main); font-size: 40px; font-weight: 800; letter-spacing: -1px; line-height: 1; }
    .count-label { color: var(--text-muted); font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-top: 4px; }
    
    .progress-container { margin-top: 4px; }
    .progress-bar { width: 100%; height: 6px; background: var(--surface); border-radius: 999px; overflow: hidden; border: 1px solid var(--border); }
    .progress-fill { height: 100%; background: var(--yt-red); width: 0%; border-radius: 999px; transition: width 1.5s cubic-bezier(0.4, 0, 0.2, 1); }
    .progress-labels { display: flex; justify-content: space-between; color: var(--text-muted); font-size: 9px; font-weight: 700; margin-top: 6px; }

    .sub-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      background: var(--text-main); color: #ffffff; font-size: 13px; font-weight: 800;
      padding: 12px; border-radius: 12px; text-decoration: none; transition: all 0.2s;
    }
    
    .sub-btn:hover { background: var(--yt-red); transform: translateY(-1px); }
  </style>
</head>
<body>

  <div class="widget">
    <div class="header">
      <div class="profile">
        <img id="yt-avatar" src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23f8f9fa' width='100' height='100'/></svg>" alt="Avatar" class="avatar">
        <div class="info">
          <span id="yt-name" class="name">Loading...</span>
          <span class="handle">@sortofdev0</span>
        </div>
      </div>
      <div class="live-badge"><div class="dot"></div>LIVE</div>
    </div>

    <div class="stats">
      <div id="yt-count" class="count">0</div>
      <div class="count-label">Subscribers</div>
    </div>

    <div class="progress-container">
      <div class="progress-bar">
        <div id="yt-progress" class="progress-fill"></div>
      </div>
      <div class="progress-labels">
        <span id="prog-current">0</span>
        <span id="prog-goal">Goal: 25</span>
      </div>
    </div>

    <a href="https://www.youtube.com/@sortofdev0?sub_confirmation=1" target="_blank" rel="noopener" class="sub-btn">
      SUBSCRIBE TO CHANNEL
    </a>
  </div>

  <script>
    const GOOGLE_API_KEY = "AIzaSyAmJzKU1txxHAL_Xeu-owQ2DFVeC8j8tF0";
    const YT_CHANNEL_ID  = "UC8eEGtjt9tW3jpkXucPBvvA";
    const CUSTOM_GOAL    = 25; // Updated to 25 as requested

    function animateValue(obj, start, end, duration) {
      let startTimestamp = null;
      const step = (timestamp) => {
        if (!startTimestamp) startTimestamp = timestamp;
        const progress = Math.min((timestamp - startTimestamp) / duration, 1);
        const easeProgress = 1 - Math.pow(1 - progress, 4);
        obj.innerHTML = Math.floor(easeProgress * (end - start) + start).toLocaleString();
        if (progress < 1) window.requestAnimationFrame(step);
      };
      window.requestAnimationFrame(step);
    }

    async function fetchYouTubeData() {
      try {
        const r = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${YT_CHANNEL_ID}&key=${GOOGLE_API_KEY}`);
        if (!r.ok) throw new Error('API error');
        const d = await r.json();
        
        if (d.items?.length) {
          const channel = d.items[0];
          const subCount = Number(channel.statistics.subscriberCount);
          
          document.getElementById('yt-avatar').src = channel.snippet.thumbnails.default.url;
          document.getElementById('yt-name').textContent = channel.snippet.title;
          animateValue(document.getElementById('yt-count'), 0, subCount, 2000);
          
          const percentage = Math.min((subCount / CUSTOM_GOAL) * 100, 100);
          document.getElementById('prog-current').textContent = subCount.toLocaleString();
          document.getElementById('prog-goal').textContent = `Goal: ${CUSTOM_GOAL}`;
          
          setTimeout(() => {
            document.getElementById('yt-progress').style.width = `${percentage}%`;
          }, 300);
        }
      } catch(e) {
        document.getElementById('yt-count').textContent = '---';
      }
    }
    
    fetchYouTubeData();
    setInterval(fetchYouTubeData, 120000);
  </script>
</body>
</html>
