<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <style>
    :root {
      --bg: #ffffff;
      --border: #e5e7eb;
      --text: #111827;
      --red: #ff0000;
      --red-light: #fee2e2;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* REMOVING SCROLLBAR: Setting overflow to hidden */
    body { 
      font-family: 'Plus Jakarta Sans', sans-serif; 
      background: transparent; 
      overflow: hidden; 
      padding: 10px;
    }
    
    .widget {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 5%; /* Fluid padding */
      width: 100%;
      max-width: 400px;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 15px;
      box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
    }

    .header { display: flex; align-items: center; justify-content: space-between; }
    .profile { display: flex; align-items: center; gap: 10px; overflow: hidden; }
    .avatar { width: 15%; aspect-ratio: 1/1; border-radius: 12px; object-fit: cover; background: #f9fafb; border: 1px solid var(--border); }
    .name { font-weight: 800; color: var(--text); font-size: clamp(12px, 3vw, 15px); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    
    .live-badge { font-size: 8px; font-weight: 800; color: var(--red); border: 1px solid var(--red); padding: 3px 6px; border-radius: 6px; letter-spacing: 0.5px; }

    .stats-area { text-align: center; }
    .count { font-size: clamp(24px, 8vw, 40px); font-weight: 800; color: var(--text); }
    .label { font-size: clamp(8px, 2vw, 10px); font-weight: 700; color: #6b7280; text-transform: uppercase; letter-spacing: 1.5px; }

    .goal-msg { font-size: clamp(10px, 2.5vw, 12px); font-weight: 600; color: var(--red); text-align: center; padding: 8px; background: var(--red-light); border-radius: 10px; }
    
    .progress-bar { width: 100%; height: 8px; background: #f3f4f6; border-radius: 999px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--red); width: 0%; transition: width 1s ease; }
    
    .sub-btn { 
      background: var(--red); color: #fff; text-align: center; padding: 12px; border-radius: 12px; 
      font-size: clamp(11px, 3vw, 13px); font-weight: 800; text-decoration: none; transition: opacity 0.2s;
    }
  </style>
</head>
<body>

  <div class="widget">
    <div class="header">
      <div class="profile">
        <img id="yt-avatar" class="avatar" src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII=">
        <span id="yt-name" class="name">Loading...</span>
      </div>
      <div class="live-badge">LIVE</div>
    </div>

    <div class="stats-area">
      <div id="yt-count" class="count">0</div>
      <div class="label">Subscribers</div>
    </div>

    <div id="goal-msg" class="goal-msg">Checking goal...</div>

    <div class="progress-bar"><div id="yt-progress" class="progress-fill"></div></div>

    <a id="sub-link" href="#" target="_blank" class="sub-btn">SUBSCRIBE NOW</a>
  </div>

  <script>
    const GOOGLE_API_KEY = "AIzaSyAmJzKU1txxHAL_Xeu-owQ2DFVeC8j8tF0";
    const YT_CHANNEL_ID = "UC8eEGtjt9tW3jpkXucPBvvA";
    const TARGET = 25;

    async function update() {
      try {
        const res = await fetch(`https://www.googleapis.com/youtube/v3/channels?part=statistics,snippet&id=${YT_CHANNEL_ID}&key=${GOOGLE_API_KEY}`);
        const data = await res.json();
        const chan = data.items[0];
        const subs = parseInt(chan.statistics.subscriberCount);

        document.getElementById('yt-name').textContent = chan.snippet.title;
        document.getElementById('yt-count').textContent = subs.toLocaleString();
        document.getElementById('yt-avatar').src = chan.snippet.thumbnails.default.url;
        document.getElementById('sub-link').href = `https://www.youtube.com/@sortofdev0?sub_confirmation=1`;

        const msg = document.getElementById('goal-msg');
        if (subs >= TARGET) {
          msg.textContent = "Goal reached! Waiting for next goal.";
        } else {
          msg.textContent = `Subscribe to reach our goal (${subs}/${TARGET})!`;
        }

        document.getElementById('yt-progress').style.width = Math.min((subs / TARGET) * 100, 100) + "%";
      } catch(e) { console.error(e); }
    }
    update();
    setInterval(update, 60000);
  </script>
</body>
</html>
