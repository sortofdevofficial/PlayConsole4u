<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PlayConsole4u</title>
<link rel="icon" type="image/png" href="favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{
  font-family:'Nunito',sans-serif;
  background:#07070f;
  color:#f0f0ff;
  height:100vh;
  overflow:hidden;
}
button,a,img,video{will-change:auto}
img{display:block;max-width:100%}
#loader{
  position:fixed;inset:0;z-index:999;
  background:#07070f;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:14px;transition:opacity .35s ease;
}
#loader .logo-box{
  width:48px;height:48px;border-radius:14px;
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  display:flex;align-items:center;justify-content:center;
  font-size:24px;animation:fl 2s ease-in-out infinite;
}
#loader h2{font-size:18px;font-weight:900;letter-spacing:5px;color:#a78bfa;}
.ltrack{width:180px;height:3px;background:#1a1a30;border-radius:99px;overflow:hidden;}
.lfill{
  height:100%;width:0%;
  background:linear-gradient(90deg,#7c3aed,#a78bfa);
  animation:lf 1.35s ease forwards;
}
@keyframes lf{to{width:100%}}
@keyframes fl{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
#bg-video{
  position:fixed;inset:0;width:100%;height:100%;
  object-fit:cover;z-index:0;opacity:.28;
  transform:translateZ(0);transition:opacity .35s ease;
}
#bg-overlay{
  position:fixed;inset:0;z-index:1;pointer-events:none;
  background:linear-gradient(135deg,rgba(7,7,15,.84),rgba(7,7,15,.52));
}
#bg-img{
  position:fixed;inset:0;width:100%;height:100%;
  object-fit:cover;z-index:1;opacity:0;
  filter:brightness(.3) saturate(.4);
  transition:opacity .35s ease;
}
.wrap{
  position:relative;z-index:10;height:100vh;
  display:flex;flex-direction:column;padding:24px 36px;
}
header{
  display:flex;align-items:center;justify-content:space-between;
  margin-bottom:28px;
}
.logo{
  display:flex;align-items:center;gap:10px;
  font-size:16px;font-weight:900;letter-spacing:3px;color:#a78bfa;
}
.logo-box{
  width:32px;height:32px;border-radius:9px;
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  display:flex;align-items:center;justify-content:center;
  font-size:16px;animation:fl 3s ease-in-out infinite;
}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap;justify-content:flex-end;}
#sign-in-btn{
  display:flex;align-items:center;gap:8px;
  background:#fff;color:#111;border:none;
  padding:7px 14px;border-radius:10px;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;
  letter-spacing:.5px;cursor:pointer;transition:.15s ease;
}
#sign-in-btn:hover{background:#e8e8ff}
#sign-in-btn img{width:15px;height:15px}
#user-chip{
  display:none;align-items:center;gap:8px;
  background:rgba(124,58,237,.16);
  border:1.5px solid rgba(167,139,250,.28);
  border-radius:999px;padding:4px 12px 4px 4px;
  cursor:pointer;transition:.15s ease;
}
#user-chip:hover{background:rgba(124,58,237,.24);border-color:#a78bfa;}
.u-badge{
  width:24px;height:24px;border-radius:50%;
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:11px;font-weight:900;flex-shrink:0;
}
#user-chip .uname{
  font-size:11px;font-weight:800;color:#a78bfa;letter-spacing:.4px;
  max-width:130px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.icon-btn{
  width:32px;height:32px;border-radius:9px;
  border:1.5px solid rgba(167,139,250,.18);
  background:rgba(124,58,237,.10);
  color:rgba(167,139,250,.72);
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:.15s ease;font-size:14px;
  text-decoration:none;
}
.icon-btn:hover{background:rgba(124,58,237,.22);border-color:#a78bfa;color:#a78bfa;}
.badge{
  font-size:10px;font-weight:800;background:rgba(124,58,237,.10);
  color:#a78bfa;padding:5px 12px;border-radius:999px;
  border:1.5px solid rgba(167,139,250,.18);
  display:flex;align-items:center;gap:6px;
}
.dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:dp 2s ease infinite;}
@keyframes dp{0%,100%{box-shadow:0 0 0 3px rgba(34,197,94,.2)}50%{box-shadow:0 0 0 7px rgba(34,197,94,0)}}
.slabel{
  font-size:10px;font-weight:800;letter-spacing:3px;
  text-transform:uppercase;color:#a78bfa;opacity:.6;margin-bottom:14px;
}
.grid{display:flex;gap:16px;flex-wrap:wrap;}
.card{
  width:260px;height:155px;background:#0f0f1c;
  border:1.5px solid rgba(167,139,250,.12);
  border-radius:16px;overflow:hidden;position:relative;
  cursor:pointer;transition:transform .16s ease,border-color .16s ease;
}
.cimg{position:absolute;inset:0}
.cimg img{width:100%;height:100%;object-fit:cover;opacity:.42;transition:opacity .2s ease,transform .2s ease;}
.covlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(7,7,15,.96) 0%,rgba(7,7,15,.08) 58%);
}
.cbody{position:absolute;bottom:0;left:0;right:0;padding:11px 15px;}
.ctag{font-size:9px;font-weight:800;letter-spacing:2px;text-transform:uppercase;color:#a78bfa;margin-bottom:3px;}
.cname{font-size:15px;font-weight:900;letter-spacing:1px;color:#f0f0ff;}
.cplay{
  position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:7px;
  background:rgba(7,7,15,.7);border:1.5px solid rgba(167,139,250,.22);
  display:flex;align-items:center;justify-content:center;
  font-size:9px;color:#a78bfa;transition:.15s ease;
}
.card:hover{transform:translateY(-3px);border-color:#7c3aed;}
.card:hover .cimg img{opacity:.62;transform:scale(1.03)}
.card:hover .cplay{background:#7c3aed;color:#fff;border-color:#7c3aed}
.card.active{border-color:#a78bfa}
.hint{margin-top:auto;font-size:10px;font-weight:700;letter-spacing:2px;color:rgba(167,139,250,.2);}
#veil{
  position:fixed;inset:0;z-index:150;
  background:rgba(0,0,0,0);pointer-events:none;transition:background .2s ease;
}
#veil.on{background:rgba(0,0,0,.62);pointer-events:all}
#sidebar{
  position:fixed;top:0;right:0;height:100%;width:0;overflow:hidden;
  background:#0c0b1a;border-left:1px solid transparent;
  display:flex;flex-direction:column;transition:width .22s ease,border-color .22s ease,padding .22s ease;
  z-index:200;
}
#sidebar.open{width:340px;border-left-color:rgba(167,139,250,.16);padding:24px 20px;}
.sb-x{
  align-self:flex-end;flex-shrink:0;width:30px;height:30px;border-radius:8px;
  border:1.5px solid rgba(167,139,250,.18);background:transparent;
  font-size:12px;cursor:pointer;color:rgba(167,139,250,.6);
  display:flex;align-items:center;justify-content:center;transition:.15s ease;
}
.sb-x:hover{background:rgba(124,58,237,.18);border-color:#a78bfa;color:#fff}
.sb-imgw{margin:12px 0;border-radius:10px;overflow:hidden;border:1.5px solid rgba(167,139,250,.12);flex-shrink:0;}
.sb-imgw img{width:100%;display:block;aspect-ratio:16/9;object-fit:cover;}
.sb-t{font-size:18px;font-weight:900;letter-spacing:1px;color:#f0f0ff;margin-bottom:4px;}
.sb-d{font-size:12px;color:#8888aa;line-height:1.7;margin-bottom:12px;}
.sb-tags{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.pill{
  font-size:9px;font-weight:800;letter-spacing:1px;text-transform:uppercase;
  padding:4px 10px;border-radius:999px;background:rgba(124,58,237,.12);
  color:#a78bfa;border:1.5px solid rgba(167,139,250,.18);
}
.sb-play{
  background:linear-gradient(135deg,#7c3aed,#a78bfa);
  color:#fff;border:none;padding:14px;
  font-family:'Nunito',sans-serif;font-size:13px;font-weight:900;letter-spacing:3px;
  border-radius:11px;cursor:pointer;margin-top:auto;flex-shrink:0;transition:.15s ease;
}
.sb-play:hover{filter:brightness(1.08)}
#modal-bg{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(0,0,0,.75);align-items:center;justify-content:center;
}
#modal-bg.open{display:flex}
.modal{
  background:#0f0f1c;border:1.5px solid rgba(167,139,250,.18);
  border-radius:18px;padding:26px;width:340px;display:flex;flex-direction:column;gap:16px;
  max-height:90vh;overflow-y:auto;
}
.modal h2{font-size:17px;font-weight:900;letter-spacing:2px;color:#a78bfa;}
.modal label{font-size:10px;font-weight:800;letter-spacing:2px;color:#7777aa;text-transform:uppercase;display:block;margin-bottom:5px;}
.modal input{
  width:100%;background:#1a1a2e;border:1.5px solid rgba(167,139,250,.18);
  color:#f0f0ff;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;
  padding:9px 12px;border-radius:9px;outline:none;
}
.modal input:focus{border-color:#a78bfa}
.mrow{display:flex;gap:8px}
.mbtn{
  flex:1;padding:10px;border:none;border-radius:9px;
  font-family:'Nunito',sans-serif;font-size:12px;font-weight:800;letter-spacing:.5px;
  cursor:pointer;transition:.15s ease;
}
.mbtn.pri{background:linear-gradient(135deg,#7c3aed,#a78bfa);color:#fff}
.mbtn.red{background:rgba(239,68,68,.12);color:#f87171;border:1.5px solid rgba(239,68,68,.22)}
.mbtn.ghost{background:rgba(255,255,255,.05);color:#7777aa;border:1.5px solid rgba(255,255,255,.08)}
.mdiv{border:none;border-top:1px solid rgba(167,139,250,.1);margin:0}
.mstat{display:flex;justify-content:space-between;font-size:12px;padding:2px 0}
.mstat span:first-child{color:#7777aa;font-weight:700}
.mstat span:last-child{color:#f0f0ff;font-weight:800}
.mmsg{font-size:11px;font-weight:700;text-align:center;min-height:16px}
.mmsg.ok{color:#4ade80}.mmsg.err{color:#f87171}
.times-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;}
.tnode{background:#1a1a2e;border-radius:8px;padding:6px 4px;text-align:center;border:1.5px solid rgba(167,139,250,.12);}
.tnode .tn{font-size:9px;font-weight:800;color:rgba(167,139,250,.5);letter-spacing:1px}
.tnode .tt{font-size:10px;font-weight:800;color:#a78bfa;margin-top:2px}
</style>
</head>
<body>
<div id="loader">
  <div class="logo-box">🎮</div>
  <h2>PLAYCONSOLE4U</h2>
  <div class="ltrack"><div class="lfill"></div></div>
</div>

<video id="bg-video" muted loop playsinline preload="metadata">
  <source src="videos/intro.mp4" type="video/mp4">
</video>
<img id="bg-img" src="" alt="">
<div id="bg-overlay"></div>

<div class="wrap">
  <header>
    <div class="logo"><div class="logo-box">🎮</div>PLAYCONSOLE4U</div>
    <div class="header-right">
      <button id="sign-in-btn" onclick="doSignIn()">
        <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="">Sign in with Google
      </button>
      <div id="user-chip" onclick="openModal()">
        <div id="u-avatar" class="u-badge">P</div>
        <span class="uname" id="u-name">Player</span>
      </div>
      <div class="icon-btn" id="settings-btn" onclick="openModal()" style="display:none" title="Settings">⚙</div>
      <a class="icon-btn" href="leaderboard.html" title="Leaderboard">🏆</a>
      <div class="badge"><div class="dot"></div>ONLINE</div>
    </div>
  </header>

  <div class="slabel">// Games</div>
  <div class="grid">
    <div class="card" id="c1"
      onclick="openSB(this,'CUBE PLATFORMER','10 levels of precision platforming. Wall-jump, spin, and race for your best time!','images/CubePlatformer/homepage.png','games/CubePlatformer/game.html',['PLATFORMER','10 LEVELS','WALL-JUMP','TIMER'])">
      <div class="cimg"><img src="images/CubePlatformer/homepage.png" alt="" loading="lazy" decoding="async" onerror="this.style.display='none'"></div>
      <div class="covlay"></div>
      <div class="cplay">▶</div>
      <div class="cbody">
        <div class="ctag">● READY</div>
        <div class="cname">CUBE PLATFORMER</div>
      </div>
    </div>
  </div>
  <div class="hint">CLICK A GAME · THEN PRESS PLAY</div>
</div>

<div id="veil" onclick="closeSB()"></div>
<div id="sidebar">
  <button class="sb-x" onclick="closeSB()">✕</button>
  <div class="sb-imgw"><img id="sbi" src="" alt="" loading="lazy" decoding="async"></div>
  <div class="sb-t" id="sbt"></div>
  <div class="sb-d" id="sbd"></div>
  <div class="sb-tags" id="sbta"></div>
  <button class="sb-play" onclick="if(goHref)location.href=goHref">▶ &nbsp; PLAY NOW</button>
</div>

<div id="modal-bg" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <h2>⚙ Settings</h2>
    <div>
      <label>Username</label>
      <input id="uname-inp" type="text" maxlength="20" placeholder="Enter username…">
    </div>
    <button class="mbtn pri" onclick="saveUsername()">Save Username</button>
    <div class="mmsg" id="mmsg"></div>
    <hr class="mdiv">
    <div>
      <label>Your Best Times — Cube Platformer</label>
      <div class="times-grid" id="times-grid"></div>
    </div>
    <hr class="mdiv">
    <div>
      <label>Account</label>
      <div class="mstat"><span>Email</span><span id="m-email">—</span></div>
      <div class="mstat"><span>Levels done</span><span id="m-done">—</span></div>
    </div>
    <div class="mrow">
      <button class="mbtn ghost" onclick="closeModal()">Close</button>
      <button class="mbtn red" onclick="doSignOut()">🚪 Logout</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>
<script>
const vid = document.getElementById('bg-video');
const bgImg = document.getElementById('bg-img');
const ldr = document.getElementById('loader');
let gone = false, goHref = '';

function hideLdr(){
  if(gone) return;
  gone = true;
  ldr.style.opacity = '0';
  setTimeout(() => ldr.style.display = 'none', 350);
}

vid.addEventListener('canplay', () => {
  vid.play().then(hideLdr).catch(hideLdr);
}, { once:true });

setTimeout(hideLdr, 2200);

document.addEventListener('click', () => {
  if(vid.paused) vid.play().catch(()=>{});
}, { passive:true });

vid.addEventListener('timeupdate', () => {
  if(vid.currentTime >= 8) vid.pause();
}, { passive:true });

let activeC = null;

function openSB(el, t, d, img, href, tags){
  if(activeC) activeC.classList.remove('active');
  el.classList.add('active');
  activeC = el;
  document.getElementById('sbt').textContent = t;
  document.getElementById('sbd').textContent = d;
  document.getElementById('sbi').src = img;
  document.getElementById('sbta').innerHTML = tags.map(x => `<span class="pill">${x}</span>`).join('');
  goHref = href;
  document.getElementById('sidebar').classList.add('open');
  document.getElementById('veil').classList.add('on');
  bgImg.src = img;
  bgImg.style.opacity = '1';
  vid.style.opacity = '.08';
}

function closeSB(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('veil').classList.remove('on');
  if(activeC){ activeC.classList.remove('active'); activeC = null; }
  bgImg.style.opacity = '0';
  vid.style.opacity = '.28';
}

async function doSignIn(){ try { await window.FB.signInGoogle(); } catch(e){ console.error(e); } }
async function doSignOut(){ await window.FB.signOut(); closeModal(); }

function fmt(s){ return s == null ? '—' : s < 60 ? s.toFixed(2)+'s' : `${Math.floor(s/60)}m ${(s%60).toFixed(0)}s`; }
function initials(name){
  const p = String(name||'Player').trim().split(/\s+/).filter(Boolean);
  return ((p[0]?.[0]||'P')+(p[1]?.[0]||'')).toUpperCase();
}
function hueFor(s){
  return [...String(s||'')].reduce((a,c)=>a+c.charCodeAt(0),0)%360;
}

async function refreshUI(user){
  const sb = document.getElementById('sign-in-btn');
  const chip = document.getElementById('user-chip');
  const settBtn = document.getElementById('settings-btn');

  if(!user){
    sb.style.display = 'flex';
    chip.style.display = 'none';
    settBtn.style.display = 'none';
    return;
  }

  sb.style.display = 'none';
  chip.style.display = 'flex';
  settBtn.style.display = 'flex';

  const profile = await window.FB.getProfile(user.uid);
  const name = profile.name || user.displayName || 'Player';

  document.getElementById('u-name').textContent = name;
  document.getElementById('uname-inp').value = name;
  document.getElementById('m-email').textContent = user.email || '—';

  const av = document.getElementById('u-avatar');
  av.textContent = initials(name);
  av.style.background = `linear-gradient(135deg,hsl(${hueFor(name)} 70% 42%),hsl(${(hueFor(name)+40)%360} 75% 55%))`;

  const times = await window.FB.getMyTimes(user.uid);
  document.getElementById('m-done').textContent = Object.keys(times).length+'/10';

  const tg = document.getElementById('times-grid');
  let html = '';
  for(let i=1;i<=10;i++){
    const e = times['L'+i];
    html += `<div class="tnode"><div class="tn">LV${i}</div><div class="tt">${e?fmt(e.t):'—'}</div></div>`;
  }
  tg.innerHTML = html;
}

window.FB.onAuthChange(user => refreshUI(user));

function openModal(){ document.getElementById('modal-bg').classList.add('open'); }
function closeModal(){ document.getElementById('modal-bg').classList.remove('open'); }

async function saveUsername(){
  const u = window.FB.currentUser();
  if(!u) return;
  const v = document.getElementById('uname-inp').value.trim();
  const msg = document.getElementById('mmsg');
  if(!v || v.length < 2){
    msg.className = 'mmsg err';
    msg.textContent = 'Min 2 characters';
    return;
  }
  await window.FB.saveProfile(u.uid, v, '');
  document.getElementById('u-name').textContent = v;
  const av = document.getElementById('u-avatar');
  av.textContent = initials(v);
  av.style.background = `linear-gradient(135deg,hsl(${hueFor(v)} 70% 42%),hsl(${(hueFor(v)+40)%360} 75% 55%))`;
  msg.className = 'mmsg ok';
  msg.textContent = '✓ Saved!';
  setTimeout(()=>msg.textContent='',2000);
}
</script>
</body>
</html>
